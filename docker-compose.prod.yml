# ============================================================
# OpenCat — 生产部署编排
# ============================================================
# 用法：
#   1. 复制 .env.production.example → .env.production
#   2. 填写所有环境变量
#   3. docker compose -f docker-compose.prod.yml up -d --build
#
# 服务：
#   - app:      Next.js 应用（端口 3000）
#   - postgres: PostgreSQL 17 + pgvector（端口 5432，仅内部访问）
#   - redis:    Redis 7（端口 6379，仅内部访问）
#
# 数据持久化：pgdata_prod 和 redisdata_prod 两个 volume

services:
  # ---- PostgreSQL（pgvector）----
  postgres:
    image: pgvector/pgvector:pg17
    container_name: opencat-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opencat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencat_prod_secret}
      POSTGRES_DB: ${POSTGRES_DB:-opencat}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: opencat-redis-prod
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # ---- Next.js 应用 ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencat-app
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      # 覆盖数据库连接为容器内部网络地址
      DATABASE_URL: postgresql://${POSTGRES_USER:-opencat}:${POSTGRES_PASSWORD:-opencat_prod_secret}@postgres:5432/${POSTGRES_DB:-opencat}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata_prod:
  redisdata_prod:

networks:
  internal:
    driver: bridge
